name: Deploy TeamUp

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://weapojomrgnygyabpcxz.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlYXBvam9tcmdueWd5YWJwY3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MTAzMzYsImV4cCI6MjA5ODI4NjMzNn0.7_kDGYsiESMq3dIFO7MmwkxLkK55nbCNCSMwOk376gQ
          VITE_ENABLED_OAUTH_PROVIDERS: google,github,discord

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
